name: Experimento completo LTN

on:
  push:
    branches: [main]
    paths:
      - 'clevr_ltn_experimentos.py'
      - '.github/workflows/full-experiment.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  full-experiment:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install numpy matplotlib torch
          pip install LTNtorch || true

      - name: Run full experiment
        run: python clevr_ltn_experimentos.py --runs 5 --epochs 350 --out resultados_clevr_ltn.csv --plot-dir figuras

      - name: Show result files
        run: |
          ls -la
          ls -la figuras
          head -n 10 resultados_clevr_ltn.csv

      - name: Commit generated results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add resultados_clevr_ltn.csv figuras/
          git commit -m "Adicionar resultados gerados [skip ci]" || echo "Sem alteracoes para commit"
          git push

      - name: Upload final artifacts
        uses: actions/upload-artifact@v4
        with:
          name: resultados-finais-ltn
          path: |
            resultados_clevr_ltn.csv
            figuras/
# trigger-full-experiment
